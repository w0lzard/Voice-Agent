[build]
builder = "dockerfile"
dockerfilePath = "services/orchestration/Dockerfile"

[deploy]
startCommand = "uvicorn services.orchestration.main:app --host 0.0.0.0 --port ${PORT:-8003}"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
